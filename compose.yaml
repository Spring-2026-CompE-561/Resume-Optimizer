services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-optimizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resume_optimizer
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data-v2:
